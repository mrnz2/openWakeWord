## openWakeWord training config for "Hey lolita"

model_name: "hey_lolita"

target_phrase:
 - "hey lolita"

custom_negative_phrases:
 - "hey lolitto"
 - "hey lola"
 - "hey lollipop"
 - "hey luna"
 - "hey leader"

# Profil „najlepsza jakość”: więcej danych, więcej augmentacji, dłuższy trening (dłużej / więcej RAM).
# tts_batch_size: przy ~16 GB RAM i Dockerze 18 potrafi dać exit 137 w okolicach batch ~700+ (OOM Piper/Torch).
# Przy 137: zejdź do 8; przy stabilnym Dockerze 12+ możesz próbować podnieść.
n_samples: 22000
n_samples_val: 3500
tts_batch_size: 8
augmentation_batch_size: 4
augmentation_rounds: 2

piper_sample_generator_path: "./piper-sample-generator"
output_dir: "/workspace/outputs"

rir_paths:
 []

background_paths:
 []

background_paths_duplication_rate:
 []

false_positive_validation_data_path: "/workspace/project/assets/validation_set_features.npy"

feature_data_files: {}

batch_n_per_class:
 "adversarial_negative": 14
 "positive": 14

model_type: "dnn"
layer_size: 32

# Po pierwszym pełnym przebiegu możesz podnieść steps i użyć --train_only (bez ponownego TTS).
steps: 64000
max_negative_weight: 1800
target_false_positives_per_hour: 0.1
